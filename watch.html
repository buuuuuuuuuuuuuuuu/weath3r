<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#000000">
<title>WEATH3R · Watch</title>
<style>
  /* ---------------------------------------------------------
     WEATH3R — Apple Watch view
     Tuned for Apple Watch Series 8 / 45 mm (≈396 px wide),
     opened in a watch web browser (e.g. µBrowser). Pure black
     background (OLED), big type, single vertical column, no
     horizontal scrolling, generous tap spacing.
     --------------------------------------------------------- */
  :root{
    --bg:#000;
    --card:#0e131b;
    --card-2:#141b25;
    --stroke:rgba(255,255,255,.10);
    --ink:#fff;
    --ink-2:#aab4c2;
    --ink-3:#6b7480;
    --rain:#3d9be9;
    --feels:#ff6b5e;
    --warn:#ffb020;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
    --t-cold:#4aa8ff;--t-cool:#5fd0c4;--t-mild:#9bd45a;--t-warm:#f4c430;--t-hot:#ff8a3d;--t-scorch:#ff5a4d;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased}
  body{
    padding:calc(env(safe-area-inset-top) + 6px) 10px calc(env(safe-area-inset-bottom) + 14px);
    max-width:430px;margin:0 auto;
    text-rendering:optimizeLegibility;
  }

  .wloc{display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:8px}
  .wloc h1{font-size:14px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:90%}
  .wloc .time{font-size:12px;color:var(--ink-3);font-weight:600;font-variant-numeric:tabular-nums}

  /* hero */
  .whero{
    background:linear-gradient(160deg,var(--card-2),var(--card));
    border:1px solid var(--stroke);border-radius:20px;
    padding:14px 16px 16px;text-align:center;position:relative;overflow:hidden;
  }
  .whero .temp{font-size:72px;font-weight:600;letter-spacing:-.04em;line-height:.92}
  .whero .temp sup{font-size:26px;font-weight:500;vertical-align:top;top:.18em;position:relative;color:var(--ink-2)}
  .whero .cond{font-size:16px;font-weight:600;margin-top:2px}
  .whero .sub{font-size:13px;color:var(--ink-2);margin-top:3px}
  .whero .feels{color:var(--feels)}

  /* compact stat row */
  .wstats{display:flex;gap:8px;margin-top:10px}
  .wstat{flex:1;background:var(--card);border:1px solid var(--stroke);border-radius:14px;
    padding:9px 6px;text-align:center}
  .wstat .k{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .wstat .v{font-size:16px;font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums}

  /* rain next 2h */
  .wsection{margin-top:14px}
  .wsection .h{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--ink-2);margin:0 4px 7px}
  .wrain{
    background:var(--card);border:1px solid var(--stroke);border-radius:16px;padding:12px 14px;
  }
  .wrain .summary{font-size:14px;font-weight:600;margin-bottom:9px;line-height:1.3}
  .wrain.dry .summary{color:var(--ink-2)}
  #wcv-rain{display:block;width:100%;height:62px}

  /* daily mini */
  .wdaily{background:var(--card);border:1px solid var(--stroke);border-radius:16px;overflow:hidden}
  .wdrow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid rgba(255,255,255,.06)}
  .wdrow:first-child{border-top:none}
  .wdrow .d{font-size:14px;font-weight:600;width:64px}
  .wdrow .d small{display:block;font-size:10px;color:var(--ink-3);font-weight:500}
  .wdrow .pr{font-size:12px;color:var(--rain);font-variant-numeric:tabular-nums;margin-left:auto;font-weight:600}
  .wdrow .pr.dry{color:var(--ink-3)}
  .wdrow .tr{display:flex;align-items:center;gap:8px;min-width:78px;justify-content:flex-end}
  .wdrow .lo{font-size:13px;color:var(--ink-2);width:24px;text-align:right;font-variant-numeric:tabular-nums}
  .wdrow .hi{font-size:14px;font-weight:700;width:24px;font-variant-numeric:tabular-nums}
  .wdrow .bar{width:34px;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--c1),var(--c2))}

  .wfoot{margin:14px 6px 0;font-size:10px;color:var(--ink-3);line-height:1.5;text-align:center}
  .wfoot a{color:var(--ink-2)}
  .werr{color:var(--feels);font-size:13px;text-align:center;padding:18px 8px;line-height:1.5}
  @media (max-width:330px){
    .whero .temp{font-size:62px}
    .wstat .v{font-size:14px}
  }
</style>
</head>
<body>
  <div class="wloc">
    <h1 id="wloc">WEATH3R</h1>
    <span class="time" id="wtime"></span>
  </div>

  <div class="whero">
    <div class="temp" id="wtemp">–<sup>°</sup></div>
    <div class="cond" id="wcond">Lädt…</div>
    <div class="sub" id="wrange">–</div>
    <div class="sub feels" id="wfeels"></div>
  </div>

  <div class="wstats">
    <div class="wstat"><div class="k">Regen</div><div class="v" id="wrain-mm">–</div></div>
    <div class="wstat"><div class="k">Wind</div><div class="v" id="wwind">–</div></div>
    <div class="wstat"><div class="k">Gefühlt</div><div class="v" id="wfeels2">–</div></div>
  </div>

  <div class="wsection">
    <div class="h">Nächste 2 Stunden</div>
    <div class="wrain" id="wrain-box">
      <div class="summary" id="wrain-summary">–</div>
      <canvas id="wcv-rain"></canvas>
    </div>
  </div>

  <div class="wsection">
    <div class="h">Vorschau</div>
    <div class="wdaily" id="wdaily"></div>
  </div>

  <p class="wfoot">
    <span id="wstatus"></span><br>
    Daten: Open-Meteo · DWD (Bright Sky)<br>
    <a href="./index.html">→ volle Ansicht</a>
  </p>

<script>
"use strict";
const DPR=Math.min(window.devicePixelRatio||1,2.5);
const DEFAULT_LOC={lat:52.45,lon:13.57,name:"Treptow-Köpenick"};
const WD=["So.","Mo.","Di.","Mi.","Do.","Fr.","Sa."];
const MO=["Jan.","Feb.","März","Apr.","Mai","Juni","Juli","Aug.","Sep.","Okt.","Nov.","Dez."];
const pad=n=>String(n).padStart(2,"0");

/* temperature → colour ramp (shared look with main app) */
const RAMP=[[4,[74,168,255]],[12,[95,208,196]],[18,[155,212,90]],[23,[244,196,48]],[28,[255,138,61]],[33,[255,90,77]]];
function tempColor(t){
  if(t<=RAMP[0][0])return RAMP[0][1];
  if(t>=RAMP[RAMP.length-1][0])return RAMP[RAMP.length-1][1];
  for(let i=0;i<RAMP.length-1;i++){const[a,ca]=RAMP[i],[b,cb]=RAMP[i+1];
    if(t>=a&&t<=b){const k=(t-a)/(b-a);return[0,1,2].map(j=>Math.round(ca[j]+(cb[j]-ca[j])*k));}}
  return RAMP[RAMP.length-1][1];
}
const rgb=c=>`rgb(${c[0]},${c[1]},${c[2]})`;

function weatherWord(code,cloud,precip){
  if(precip>0.1)return "Regen";
  if(code!=null){
    if(code>=95)return "Gewitter";
    if(code>=71&&code<=77)return "Schnee";
    if(code>=51&&code<=67)return "Regen";
    if(code>=45&&code<=48)return "Nebel";
    if(code>=1&&code<=3)return cloud>60?"Bewölkt":"Heiter";
    if(code===0)return "Klar";
  }
  if(cloud!=null)return cloud>70?"Bewölkt":cloud>30?"Heiter":"Klar";
  return "–";
}

/* ---- geolocation ---- */
function getLocation(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){resolve(DEFAULT_LOC);return;}
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:+p.coords.latitude.toFixed(3),lon:+p.coords.longitude.toFixed(3),name:null}),
      ()=>resolve(DEFAULT_LOC),
      {timeout:6000,maximumAge:10*60*1000}
    );
  });
}
async function resolveName(geo){
  if(geo.name)return geo;
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${geo.lat}&longitude=${geo.lon}&localityLanguage=de`);
    if(r.ok){const j=await r.json();geo.name=(j.locality||j.city||j.principalSubdivision||"Mein Standort");}
  }catch(e){geo.name="Mein Standort";}
  return geo;
}

/* ---- single-call Open-Meteo (best model, no multi-model overhead) ---- */
async function fetchWeather(geo){
  const u=new URL("https://api.open-meteo.com/v1/forecast");
  u.searchParams.set("latitude",geo.lat);
  u.searchParams.set("longitude",geo.lon);
  u.searchParams.set("current",["temperature_2m","apparent_temperature","precipitation","weather_code","cloud_cover","wind_speed_10m"].join(","));
  u.searchParams.set("daily",["temperature_2m_max","temperature_2m_min","precipitation_sum","weather_code"].join(","));
  u.searchParams.set("timezone","auto");
  u.searchParams.set("forecast_days","5");
  u.searchParams.set("wind_speed_unit","kmh");
  const res=await fetch(u.toString());
  if(!res.ok)throw new Error("OM "+res.status);
  return res.json();
}

/* ---- DWD radar nowcast (Bright Sky) for the 2h rain strip ---- */
function radarInten(mmh){return Math.max(0,Math.min(1,Math.sqrt(mmh/8)));}
async function fetchRadar(geo){
  const now=new Date(),end=new Date(now.getTime()+125*60*1000);
  const u=new URL("https://api.brightsky.dev/radar");
  u.searchParams.set("lat",geo.lat);u.searchParams.set("lon",geo.lon);
  u.searchParams.set("distance",1000);u.searchParams.set("format","plain");
  u.searchParams.set("date",now.toISOString());u.searchParams.set("last_date",end.toISOString());
  const res=await fetch(u.toString());
  if(!res.ok)throw new Error("Radar "+res.status);
  return res.json();
}
function buildRadarNowcast(j,now){
  if(!j||!Array.isArray(j.radar)||!j.radar.length)return null;
  const pos=j.latlon_position||{x:0,y:0};
  const px=Math.max(0,Math.round(pos.x)),py=Math.max(0,Math.round(pos.y));
  const frames=[];
  j.radar.forEach(fr=>{
    const t=new Date(fr.timestamp);let v=0;
    try{const g=fr.precipitation_5;const row=g[py]!=null?g[py]:g[0];v=row[px]!=null?row[px]:row[0];}catch(e){v=0;}
    if(v==null||v<0)v=0;
    frames.push({time:t,mmh:(v/100)*12});
  });
  if(!frames.length)return null;
  let s=frames.length-1;
  for(let i=0;i<frames.length;i++){if(frames[i].time>=now){s=Math.max(0,i-1);break;}}
  const slice=frames.slice(s);if(!slice.length)return null;
  const t0=slice[0].time.getTime();
  const pts=slice.map(p=>({mins:Math.round((p.time.getTime()-t0)/60000),mmh:p.mmh,inten:radarInten(p.mmh),
    label:p.time.getHours()+":"+pad(p.time.getMinutes())}));
  const total=pts[pts.length-1].mins||120;
  const WET=0.1;let summary;
  if(pts[0].mmh>=WET){const stop=pts.find((p,i)=>i>0&&p.mmh<WET);
    summary=stop?`Regen lässt gegen ${stop.label} nach`:"Regen hält an";}
  else{const b=pts.find(p=>p.mmh>=WET);summary=b?`Regen ab ca. ${b.label}`:"Kein Regen in den nächsten 2 Std.";}
  return {radar:true,totalMins:total,pts,summary};
}

/* fallback nowcast from Open-Meteo minutely_15 if radar unavailable */
async function fetchMinutely(geo){
  const u=new URL("https://api.open-meteo.com/v1/forecast");
  u.searchParams.set("latitude",geo.lat);u.searchParams.set("longitude",geo.lon);
  u.searchParams.set("minutely_15",["precipitation","precipitation_probability"].join(","));
  u.searchParams.set("timezone","auto");u.searchParams.set("forecast_minutely_15","12");
  const res=await fetch(u.toString());if(!res.ok)throw new Error("min15 "+res.status);
  return res.json();
}
function buildMinutelyNowcast(j,now){
  const M=j&&j.minutely_15;if(!M||!M.time)return null;
  const t=M.time,pr=M.precipitation||[];
  let s=0;for(let i=0;i<t.length;i++){if(new Date(t[i])>=now){s=Math.max(0,i-1);break;}}
  const slice=[];for(let i=s;i<t.length&&slice.length<12;i++)slice.push({time:new Date(t[i]),mmh:(pr[i]||0)*4});
  if(!slice.length)return null;
  const t0=slice[0].time.getTime();
  const pts=slice.map(p=>({mins:Math.round((p.time.getTime()-t0)/60000),mmh:p.mmh,inten:radarInten(p.mmh),
    label:p.time.getHours()+":"+pad(p.time.getMinutes())}));
  const total=pts[pts.length-1].mins||120;
  const WET=0.1;let summary;
  if(pts[0].mmh>=WET){const stop=pts.find((p,i)=>i>0&&p.mmh<WET);summary=stop?`Regen lässt gegen ${stop.label} nach`:"Regen hält an";}
  else{const b=pts.find(p=>p.mmh>=WET);summary=b?`Regen ab ca. ${b.label}`:"Kein Regen in den nächsten 2 Std.";}
  return {radar:false,totalMins:total,pts,summary};
}

/* ---- rain strip renderer ---- */
function drawRainStrip(nc){
  const cv=document.getElementById("wcv-rain");if(!cv)return;
  const ctx=cv.getContext("2d");
  let W=cv.clientWidth||document.body.clientWidth-60;if(W<60)W=300;
  const H=62;cv.width=W*DPR;cv.height=H*DPR;cv.style.height=H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);ctx.clearRect(0,0,W,H);
  if(!nc||!nc.pts||!nc.pts.length)return;
  const padB=14,padT=4,x0=2,x1=W-2,plotW=x1-x0;
  const total=nc.totalMins||120;
  const X=m=>x0+(m/total)*plotW;
  const baseY=H-padB,barMax=H-padB-padT;
  function inColor(v){const stops=[[0,[46,204,113]],[.5,[26,160,170]],[1,[40,110,230]]];
    for(let i=0;i<stops.length-1;i++){const[a,ca]=stops[i],[b,cb]=stops[i+1];
      if(v>=a&&v<=b){const k=(v-a)/(b-a);return[0,1,2].map(j=>Math.round(ca[j]+(cb[j]-ca[j])*k));}}
    return stops[2][1];}
  const slotW=plotW/Math.max(1,nc.pts.length);
  let anyRain=false;
  nc.pts.forEach(p=>{
    if(p.inten<=0.005)return;anyRain=true;
    const cx=X(p.mins),bw=Math.max(3,slotW*0.7),bh=Math.max(2,p.inten*barMax);
    const c=inColor(p.inten);
    ctx.fillStyle=rgb(c);
    const x=cx-bw/2,y=baseY-bh,r=Math.min(bw/2,3);
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+bw,y,x+bw,y+bh,r);ctx.arcTo(x+bw,y+bh,x,y+bh,r);
    ctx.arcTo(x,y+bh,x,y,r);ctx.arcTo(x,y,x+bw,y,r);ctx.closePath();ctx.fill();
  });
  // time ticks every 30 min
  ctx.font="9px "+getComputedStyle(document.body).fontFamily;
  ctx.fillStyle="#6b7480";ctx.textAlign="center";ctx.textBaseline="alphabetic";
  for(let m=0;m<=total;m+=30){
    const x=X(m);
    let best=nc.pts[0],bd=1e9;nc.pts.forEach(p=>{const d=Math.abs(p.mins-m);if(d<bd){bd=d;best=p;}});
    ctx.fillText(best.label,Math.max(12,Math.min(W-12,x)),H-3);
  }
  if(!anyRain){
    ctx.fillStyle="#6b7480";ctx.font="11px "+getComputedStyle(document.body).fontFamily;
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("trocken",W/2,barMax*0.5+padT);
  }
}

function fmtMM(sum){
  if(sum==null||sum<0.05)return "trocken";
  const f=x=>(Math.round(x*10)/10).toString().replace(".",",");
  return f(sum)+" mm";
}

function renderDaily(daily){
  const el=document.getElementById("wdaily");if(!el||!daily||!daily.time)return;
  el.innerHTML="";
  const n=Math.min(4,daily.time.length);
  for(let d=0;d<n;d++){
    const dt=new Date(daily.time[d]);
    const lo=daily.temperature_2m_min?Math.round(daily.temperature_2m_min[d]):null;
    const hi=daily.temperature_2m_max?Math.round(daily.temperature_2m_max[d]):null;
    const pr=daily.precipitation_sum?daily.precipitation_sum[d]:null;
    const prTxt=fmtMM(pr);const dry=prTxt==="trocken";
    const loC=lo!=null?rgb(tempColor(lo)):"var(--ink-2)";
    const hiC=hi!=null?rgb(tempColor(hi)):"var(--ink)";
    const dayName=d===0?"Heute":WD[dt.getDay()];
    const row=document.createElement("div");row.className="wdrow";
    row.innerHTML=`
      <div class="d">${dayName}<small>${dt.getDate()}. ${MO[dt.getMonth()]}</small></div>
      <div class="pr ${dry?'dry':''}">${prTxt}</div>
      <div class="tr">
        <span class="lo">${lo!=null?lo+'°':'–'}</span>
        <span class="bar" style="--c1:${loC};--c2:${hiC}"></span>
        <span class="hi" style="color:${hiC}">${hi!=null?hi+'°':'–'}</span>
      </div>`;
    el.appendChild(row);
  }
}

function tick(){
  const now=new Date();
  const el=document.getElementById("wtime");
  if(el)el.textContent=now.getHours()+":"+pad(now.getMinutes());
}

let _nc=null;
async function boot(){
  tick();setInterval(tick,30000);
  const geo=await getLocation();
  try{
    const wx=await fetchWeather(geo);
    try{await resolveName(geo);}catch(e){}
    document.getElementById("wloc").textContent=geo.name||"Mein Standort";

    const cur=wx.current||{};
    const code=cur.weather_code,cloud=cur.cloud_cover,precip=cur.precipitation;
    document.getElementById("wtemp").innerHTML=`${Math.round(cur.temperature_2m)}<sup>°</sup>`;
    document.getElementById("wcond").textContent=weatherWord(code,cloud,precip);
    if(wx.daily&&wx.daily.temperature_2m_max){
      const hi=Math.round(wx.daily.temperature_2m_max[0]),lo=Math.round(wx.daily.temperature_2m_min[0]);
      document.getElementById("wrange").textContent=`${lo}° / ${hi}°`;
    }
    const feels=cur.apparent_temperature!=null?Math.round(cur.apparent_temperature):null;
    document.getElementById("wfeels").textContent=feels!=null?`Gefühlt ${feels}°`:"";
    const f=x=>(Math.round(x*10)/10).toString().replace(".",",");
    document.getElementById("wrain-mm").textContent=(precip!=null&&precip>0.05)?`${f(precip)}`:"0";
    document.getElementById("wwind").textContent=cur.wind_speed_10m!=null?`${Math.round(cur.wind_speed_10m)}`:"–";
    document.getElementById("wfeels2").textContent=feels!=null?`${feels}°`:"–";

    renderDaily(wx.daily);

    // 2h rain: radar first, minutely fallback
    const now=new Date();
    try{
      const r=await fetchRadar(geo);_nc=buildRadarNowcast(r,now);
    }catch(e){_nc=null;}
    if(!_nc){try{const m=await fetchMinutely(geo);_nc=buildMinutelyNowcast(m,now);}catch(e){}}
    if(_nc){
      document.getElementById("wrain-summary").textContent=_nc.summary;
      const box=document.getElementById("wrain-box");
      const dry=!_nc.pts.some(p=>p.mmh>=0.1);
      box.classList.toggle("dry",dry);
      drawRainStrip(_nc);
    } else {
      document.getElementById("wrain-summary").textContent="Regenvorschau nicht verfügbar";
    }
    document.getElementById("wstatus").textContent="";
  }catch(err){
    document.getElementById("wcond").textContent="Keine Verbindung";
    document.getElementById("wstatus").textContent="Fehler beim Laden";
    console.error(err);
  }
}
window.addEventListener("resize",()=>{if(_nc)drawRainStrip(_nc);});
window.addEventListener("load",()=>{if(_nc)drawRainStrip(_nc);});
boot();

/* register the shared service worker so the watch view installs/caches too */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{});});
}
</script>
</body>
</html>
